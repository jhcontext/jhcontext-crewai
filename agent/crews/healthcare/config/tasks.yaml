sensor_task:
  description: >
    {_forwarding_preamble}Collect simulated clinical observations for patient {patient_id}:
    demographics (age: {age}, gender: {gender}), lab results
    ({lab_results}), imaging metadata ({imaging_metadata}).

    Output a jhcontext protocol envelope. Place all clinical observations
    in the ``semantic_payload`` field as a list of observation dicts.
    Register one artifact in ``artifacts_registry`` with
    artifact_id="art-sensor" and type="token_sequence".
    Set scope="healthcare_treatment_recommendation",
    producer="did:hospital:sensor-agent",
    compliance.risk_level="high", compliance.human_oversight_required=true,
    compliance.forwarding_policy="raw_forward".
  expected_output: >
    A jhcontext Envelope JSON with semantic_payload containing structured
    patient observations (demographics, lab results, imaging metadata),
    artifacts_registry with one TOKEN_SEQUENCE artifact, and compliance
    block set to high risk with human oversight required and
    forwarding_policy=raw_forward.
  agent: sensor_agent

situation_task:
  description: >
    {_forwarding_preamble}You will receive a jhcontext protocol envelope
    from the sensor task. Read the ``semantic_payload`` field — this is
    the auditable semantic extraction of the patient's clinical
    observations.

    Generate a semantic extraction summarizing the patient's clinical
    situation: current diagnosis status, risk indicators, and recommended
    assessment priority. Produce human-readable semantic summaries.

    Output a jhcontext protocol envelope. Place your semantic extraction
    in ``semantic_payload`` as a list of interpretation/situation dicts.
    Register one artifact in ``artifacts_registry`` with
    artifact_id="art-situation" and type="semantic_extraction".
    Set scope="healthcare_treatment_recommendation",
    producer="did:hospital:situation-agent",
    compliance.risk_level="high", compliance.human_oversight_required=true,
    compliance.forwarding_policy="semantic_forward".
    Include decision_influence with categories like "patient_history",
    "risk_indicators" and appropriate influence_weights.
  expected_output: >
    A jhcontext Envelope JSON with semantic_payload containing a clinical
    situation assessment (risk level, key indicators, priority), one
    SEMANTIC_EXTRACTION artifact in artifacts_registry, compliance block
    set to high risk, and decision_influence metadata.
  agent: situation_agent

decision_task:
  description: >
    {_forwarding_preamble}You will receive a jhcontext protocol envelope
    from the situation task. Read the ``semantic_payload`` field — this is
    the auditable semantic extraction of the patient's clinical situation.

    Generate a treatment recommendation with: (a) recommended treatment
    plan, (b) confidence score (0-1), (c) supporting evidence from the
    semantic extraction, (d) risk assessment. Flag
    human_oversight_required=true for any case with confidence < 0.95
    or risk_level=high.

    Output a jhcontext protocol envelope. Place your recommendation in
    ``semantic_payload``. Register one artifact in ``artifacts_registry``
    with artifact_id="art-decision" and type="semantic_extraction".
    Set scope="healthcare_treatment_recommendation",
    producer="did:hospital:decision-agent",
    compliance.risk_level="high", compliance.human_oversight_required=true,
    compliance.forwarding_policy="semantic_forward".
    Include decision_influence with categories like "clinical_situation",
    "treatment_protocols", "risk_assessment" and influence_weights.
  expected_output: >
    A jhcontext Envelope JSON with semantic_payload containing a treatment
    recommendation (plan, confidence, evidence, risk), one
    SEMANTIC_EXTRACTION artifact in artifacts_registry, compliance block
    set to high risk with oversight required, and decision_influence
    metadata showing which clinical factors influenced the recommendation.
  agent: decision_agent

oversight_task:
  description: >
    Simulate physician review of the AI recommendation:
    1. Access original CT scan metadata (wait 4 seconds)
    2. Access treatment history (wait 3 seconds)
    3. Access pathology report (wait 2 seconds)
    4. Review AI recommendation (wait 1 second)
    Record each access as a timestamped event.
    Then either approve the recommendation or provide an
    override with clinical justification.
  expected_output: >
    Physician review report with: timestamped document access
    log, total review duration, decision (approve/override),
    and clinical justification. If overriding, specify the
    alternative treatment plan.
  agent: oversight_agent

audit_task:
  description: >
    Reconstruct the full decision chain for this case.
    Verify: (a) physician accessed source documents BEFORE
    approving/overriding the AI recommendation, (b) total
    review duration was meaningful (>5 seconds simulated),
    (c) physician exercised independent judgment (not rubber-stamp).
    Produce a structured audit report with PASS/FAIL for each check.
  expected_output: >
    Structured audit report with: decision chain reconstruction,
    temporal verification results (PASS/FAIL), human oversight
    quality assessment, and overall Article 14 compliance status.
  agent: audit_agent
