audit_task:
  description: >
    Reconstruct the full decision chain for this case.
    Verify: (a) physician accessed source documents BEFORE
    approving/overriding the AI recommendation, (b) total
    review duration was meaningful (>5 seconds simulated),
    (c) physician exercised independent judgment (not rubber-stamp).
    Produce a structured audit report with PASS/FAIL for each check.
  expected_output: >
    Structured audit report with: decision chain reconstruction,
    temporal verification results (PASS/FAIL), human oversight
    quality assessment, and overall Article 14 compliance status.
  agent: audit_agent
