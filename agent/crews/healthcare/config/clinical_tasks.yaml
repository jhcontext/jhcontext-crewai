sensor_task:
  description: >
    {_forwarding_preamble}Collect simulated clinical observations for patient {patient_id}:
    demographics (age: {age}, gender: {gender}), lab results
    ({lab_results}), imaging metadata ({imaging_metadata}).

    Output a jhcontext protocol envelope. Place all clinical observations
    in the ``semantic_payload`` field using the **UserML format**:

    {{"@model": "UserML", "layers": {{"observation": [
      {{"subject": "{patient_id}", "predicate": "demographic", "object": {{"age": {age}, "gender": "{gender}"}}}},
      {{"subject": "{patient_id}", "predicate": "lab_result", "object": {{"name": "CEA", "value": 12.5, "unit": "ng/mL"}}}},
      {{"subject": "{patient_id}", "predicate": "imaging_finding", "object": "2.3cm pulmonary nodule RUL"}}
    ]}}}}

    Valid observation predicates: vital_sign, lab_result, imaging_finding,
    demographic, medication_history. Each entry MUST have subject, predicate,
    and object keys.

    Register one artifact in ``artifacts_registry`` with
    artifact_id="art-sensor" and type="token_sequence".
    Set scope="healthcare_treatment_recommendation",
    producer="did:hospital:sensor-agent",
    compliance.risk_level="high", compliance.human_oversight_required=true,
    compliance.forwarding_policy="raw_forward".
  expected_output: >
    A jhcontext Envelope JSON with semantic_payload in UserML format
    containing structured patient observations (demographics, lab results,
    imaging metadata) using valid healthcare predicates,
    artifacts_registry with one TOKEN_SEQUENCE artifact, and compliance
    block set to high risk with human oversight required and
    forwarding_policy=raw_forward.
  agent: sensor_agent

situation_task:
  description: >
    {_forwarding_preamble}You will receive a jhcontext protocol envelope
    from the sensor task. Read the ``semantic_payload`` field — this is
    the auditable semantic extraction of the patient's clinical
    observations.

    Generate a semantic extraction summarizing the patient's clinical
    situation: current diagnosis status, risk indicators, and recommended
    assessment priority. Produce human-readable semantic summaries.

    Output a jhcontext protocol envelope. Place your semantic extraction
    in ``semantic_payload`` using the **UserML format** with interpretation
    and situation layers:

    {{"@model": "UserML", "layers": {{
      "observation": [],
      "interpretation": [
        {{"subject": "PATIENT_ID", "predicate": "risk_assessment", "object": "high", "confidence": 0.87}},
        {{"subject": "PATIENT_ID", "predicate": "clinical_pattern", "object": "responding_to_treatment", "confidence": 0.82}}
      ],
      "situation": [
        {{"subject": "PATIENT_ID", "predicate": "isInSituation", "object": "treatment_candidate", "confidence": 0.87}}
      ]
    }}}}

    Valid interpretation predicates: risk_assessment, clinical_pattern,
    treatment_response, biomarker_trend. Valid situation types:
    treatment_candidate, monitoring_required, acute_episode, stable_remission.

    Register one artifact in ``artifacts_registry`` with
    artifact_id="art-situation" and type="semantic_extraction".
    Set scope="healthcare_treatment_recommendation",
    producer="did:hospital:situation-agent",
    compliance.risk_level="high", compliance.human_oversight_required=true,
    compliance.forwarding_policy="semantic_forward".
    Include decision_influence with categories like "patient_history",
    "risk_indicators" and appropriate influence_weights.
  expected_output: >
    A jhcontext Envelope JSON with semantic_payload in UserML format
    containing interpretation and situation layers with valid healthcare
    predicates, one SEMANTIC_EXTRACTION artifact in artifacts_registry,
    compliance block set to high risk, and decision_influence metadata.
  agent: situation_agent

decision_task:
  description: >
    {_forwarding_preamble}You will receive a jhcontext protocol envelope
    from the situation task. Read the ``semantic_payload`` field — this is
    the auditable semantic extraction of the patient's clinical situation.

    Generate a treatment recommendation with: (a) recommended treatment
    plan, (b) confidence score (0-1), (c) supporting evidence from the
    semantic extraction, (d) risk assessment. Flag
    human_oversight_required=true for any case with confidence < 0.95
    or risk_level=high.

    Output a jhcontext protocol envelope. Place your recommendation in
    ``semantic_payload`` using the **UserML format** with situation and
    application layers:

    {{"@model": "UserML", "layers": {{
      "observation": [],
      "interpretation": [],
      "situation": [
        {{"subject": "PATIENT_ID", "predicate": "isInSituation", "object": "treatment_candidate", "confidence": 0.87}}
      ],
      "application": [
        {{"predicate": "treatment_recommendation", "object": "continue_chemotherapy_with_reassessment"}},
        {{"predicate": "oversight_required", "object": true}},
        {{"predicate": "confidence_score", "object": 0.87}}
      ]
    }}}}

    Valid application predicates: treatment_recommendation,
    oversight_required, confidence_score.

    Register one artifact in ``artifacts_registry``
    with artifact_id="art-decision" and type="semantic_extraction".
    Set scope="healthcare_treatment_recommendation",
    producer="did:hospital:decision-agent",
    compliance.risk_level="high", compliance.human_oversight_required=true,
    compliance.forwarding_policy="semantic_forward".
    Include decision_influence with categories like "clinical_situation",
    "treatment_protocols", "risk_assessment" and influence_weights.
  expected_output: >
    A jhcontext Envelope JSON with semantic_payload in UserML format
    containing situation and application layers (treatment plan,
    confidence, evidence, risk), one SEMANTIC_EXTRACTION artifact in
    artifacts_registry, compliance block set to high risk with oversight
    required, and decision_influence metadata.
  agent: decision_agent
