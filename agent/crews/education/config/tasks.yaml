ingestion_task:
  description: >
    Receive essay submission from student {student_id}.
    Separate: (a) essay text content ({essay_topic}, {word_count} words),
    (b) identity data (name, student ID, demographic attributes).
    Create a structured output with essay text as the primary
    artifact and identity data clearly marked as separate.
    The essay text output must contain ZERO identity references.

    Output the essay content metrics using the **UserML format** in
    your response (observation layer only):

    {{"@model": "UserML", "layers": {{
      "observation": [
        {{"subject": "essay-{student_id}", "predicate": "word_count", "object": {word_count}}},
        {{"subject": "essay-{student_id}", "predicate": "structural_element", "object": "introduction"}},
        {{"subject": "essay-{student_id}", "predicate": "citation_count", "object": 0}}
      ]
    }}}}

    Valid observation predicates: rubric_score, word_count, citation_count,
    structural_element.
  expected_output: >
    Two clearly separated outputs: (1) anonymized essay text
    content with UserML observation-layer metadata (word_count,
    structural_elements, citation_count), (2) identity data package
    marked as access-controlled. Both with content hashes.
  agent: ingestion_agent

grading_task:
  description: >
    Consume ONLY the essay text artifact. Evaluate against rubric:
    argument quality (30%), evidence use (30%), writing clarity
    (20%), critical thinking (20%). Produce a grade with
    confidence score. Your decision_influence must reference
    ONLY content-based categories — never identity attributes.

    Output your grading result using the **UserML format** with
    interpretation and situation layers:

    {{"@model": "UserML", "layers": {{
      "observation": [],
      "interpretation": [
        {{"subject": "ESSAY_ID", "predicate": "argument_quality", "object": 0.82, "confidence": 0.9}},
        {{"subject": "ESSAY_ID", "predicate": "evidence_strength", "object": 0.78, "confidence": 0.85}},
        {{"subject": "ESSAY_ID", "predicate": "writing_clarity", "object": 0.88, "confidence": 0.92}},
        {{"subject": "ESSAY_ID", "predicate": "critical_thinking", "object": 0.75, "confidence": 0.87}}
      ],
      "situation": [
        {{"subject": "ESSAY_ID", "predicate": "isInSituation", "object": "grade_assigned", "confidence": 0.88}}
      ],
      "application": [
        {{"predicate": "overall_grade", "object": {{"letter": "B+", "numeric": 87}}}},
        {{"predicate": "grade_confidence", "object": 0.88}}
      ]
    }}}}

    Valid interpretation predicates: argument_quality, evidence_strength,
    writing_clarity, critical_thinking. Valid situation types:
    assessment_complete, grade_assigned.
  expected_output: >
    Grading report in UserML format with: interpretation layer
    containing per-criterion scores (argument_quality, evidence_strength,
    writing_clarity, critical_thinking), situation layer with
    grade_assigned, and application layer with overall grade and
    confidence. decision_influence must list only content-based
    categories.
  agent: grading_agent

equity_task:
  description: >
    In a SEPARATE workflow: consume aggregate identity metadata
    for institutional reporting. Produce grade distribution
    statistics by demographic group. This output must have
    NO connection to individual grading decisions.
  expected_output: >
    Aggregate equity report with grade distribution by
    demographic group, statistical significance tests, and
    institutional recommendations. No individual student
    identifiers or grades linked to identities.
  agent: equity_agent

audit_task:
  description: >
    Verify negative proof: identity artifacts must be absent
    from the grading PROV dependency chain. Verify isolation:
    equity reporting workflow must have no shared artifacts
    with grading workflow. Check for implicit proxies
    (writing style, vocabulary patterns that could correlate
    with demographics). Produce structured audit report.
  expected_output: >
    Audit report with: (1) negative proof verification
    (PASS/FAIL — identity absent from grading chain),
    (2) workflow isolation verification (PASS/FAIL — zero
    shared artifacts), (3) implicit proxy risk assessment,
    (4) overall Article 13 compliance status.
  agent: audit_agent
